[build]
builder = "NIXPACKS"
buildCommand = "pnpm install --frozen-lockfile && npx prisma generate --schema=./prisma/schema.prisma && pnpm --filter @fraterunion/api build"

[deploy]
startCommand = "npx prisma migrate deploy --schema=./prisma/schema.prisma && node apps/api/dist/main.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
